<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>

<!-- ─── Toolbar ───────────────────────────────────────────── -->
<div id="toolbar">

  <!-- File actions -->
  <div class="toolbar-section">
    <button class="text-btn secondary" id="btn-open" title="Open PDF (Ctrl+O)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      Open
    </button>
    <input type="file" id="file-input" accept=".pdf" style="display:none">
  </div>

  <div class="toolbar-separator"></div>

  <!-- Drawing tools -->
  <div class="toolbar-section" id="tool-buttons">
    <button class="tool-btn active" id="tool-select" data-tool="select" title="Select">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 3l14 9-7 1-3 7z"/>
      </svg>
    </button>
    <button class="tool-btn" id="tool-text" data-tool="text" title="Text">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="4 7 4 4 20 4 20 7"/>
        <line x1="9" y1="20" x2="15" y2="20"/>
        <line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
    </button>
    <button class="tool-btn" id="tool-draw" data-tool="draw" title="Pen / Freehand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </button>
    <button class="tool-btn" id="tool-highlight" data-tool="highlight" title="Highlight">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="3" y="10" width="18" height="8" rx="2" opacity="0.5"/>
        <path d="M3 18h18v2H3z" fill="currentColor" opacity="0.8"/>
      </svg>
    </button>
    <button class="tool-btn" id="tool-rect" data-tool="rect" title="Rectangle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
    </button>
    <button class="tool-btn" id="tool-circle" data-tool="circle" title="Circle / Ellipse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
      </svg>
    </button>
    <button class="tool-btn" id="tool-line" data-tool="line" title="Line">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="5" y1="19" x2="19" y2="5"/>
      </svg>
    </button>
    <button class="tool-btn" id="tool-arrow" data-tool="arrow" title="Arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="5" y1="19" x2="19" y2="5"/>
        <polyline points="9 5 19 5 19 15"/>
      </svg>
    </button>
    <button class="tool-btn" id="tool-eraser" data-tool="eraser" title="Eraser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 20H7L3 16l13-13 4 4-11.5 11.5"/>
        <path d="M6.5 17.5l4-4"/>
      </svg>
    </button>
  </div>

  <div class="toolbar-separator"></div>

  <!-- Style controls -->
  <div class="toolbar-section">
    <input type="color" id="color-picker" value="#e63946" title="Stroke / fill color">
    <span class="toolbar-label">Size</span>
    <input type="range" id="stroke-width" min="1" max="20" value="3" title="Stroke width">
  </div>

  <div class="toolbar-separator"></div>

  <!-- Page navigation -->
  <div class="toolbar-section">
    <button class="tool-btn" id="btn-prev-page" title="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div id="page-nav">
      <input type="number" id="page-input" min="1" value="1">
      <span id="page-total">/ 1</span>
    </div>
    <button class="tool-btn" id="btn-next-page" title="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <div class="toolbar-separator"></div>

  <!-- Zoom controls -->
  <div class="toolbar-section">
    <button class="tool-btn" id="btn-zoom-out" title="Zoom out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <span id="zoom-display">100%</span>
    <button class="tool-btn" id="btn-zoom-in" title="Zoom in">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <button class="tool-btn" id="btn-fit-page" title="Fit page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
    <button class="tool-btn" id="btn-fit-width" title="Fit width">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12H3"/>
        <polyline points="9 18 3 12 9 6"/>
        <polyline points="15 6 21 12 15 18"/>
      </svg>
    </button>
  </div>

  <!-- Right section -->
  <div class="toolbar-section right">
    <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 7v6h6"/>
        <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
      </svg>
    </button>
    <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 7v6h-6"/>
        <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
      </svg>
    </button>
    <div class="toolbar-separator"></div>
    <button class="tool-btn" id="btn-toggle-sidebar" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
    <button class="text-btn primary" id="btn-save" title="Save PDF (Ctrl+S)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Save PDF
    </button>
  </div>
</div>

<!-- ─── Main ───────────────────────────────────────────────── -->
<div id="main">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">Pages</div>
    <div id="thumbnail-list"></div>
  </div>

  <!-- Canvas area -->
  <div id="canvas-area">

    <!-- Drop overlay (shown when no PDF loaded) -->
    <div id="drop-overlay">
      <div class="drop-zone" id="drop-zone">
        <svg class="drop-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="13" x2="12" y2="17"/>
          <polyline points="9 16 12 13 15 16"/>
        </svg>
        <div class="drop-title">Drop a PDF here</div>
        <div class="drop-subtitle">or click to open a file</div>
        <button class="btn-open-file" id="btn-open-file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Open PDF
        </button>
      </div>
    </div>

    <!-- Page container (canvas stack) -->
    <div id="page-container" style="display:none">
      <canvas id="pdf-canvas"></canvas>
      <canvas id="annotation-canvas"></canvas>
    </div>

    <!-- Loading spinner -->
    <div id="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Text input overlay -->
    <div id="text-input-overlay">
      <input type="text" id="text-input-field" placeholder="Enter text…">
    </div>
  </div>
</div>

<!-- ─── Status bar ─────────────────────────────────────────── -->
<div id="status-bar">
  <span id="status-file">No file loaded</span>
  <span id="status-page"></span>
  <span id="status-zoom"></span>
  <span id="status-tool"></span>
</div>

<!-- ─── Libraries ─────────────────────────────────────────── -->
<script src="libs/pdf.min.js"></script>
<script src="libs/pdf-lib.min.js"></script>
<script src="editor.js"></script>
</body>
</html>
