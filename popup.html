<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Editor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="logo">
      <img src="icons/icon48.png" alt="PDF Editor" width="36" height="36">
      <h1>PDF Editor</h1>
    </div>
    <p class="subtitle">Open, annotate, and save PDF files</p>
    <button id="open-editor" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      Open Editor
    </button>
    <div class="features">
      <div class="feature">✏️ Annotate PDFs</div>
      <div class="feature">🖊️ Freehand drawing</div>
      <div class="feature">💾 Save &amp; download</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
